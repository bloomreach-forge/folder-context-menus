<html xmlns:wicket="http://wicket.apache.org/">
<wicket:extend>
  <div wicket:id="formContainer">
    <div class="take-offline-folder-dialog">
      <p class="takeoffline-warning">
        <wicket:message key="folder.action.takeoffline.warning">
          This will take all published documents in this folder offline. Live documents will no longer be visible on the site.
        </wicket:message>
      </p>
      <p class="takeoffline-folder-name">
        <span class="field-label">
          <wicket:message key="folder.action.takeoffline.label.folder.name">Folder:</wicket:message>
        </span>
        <strong wicket:id="folderName">Folder Name</strong>
      </p>
      <p class="takeoffline-note">
        <wicket:message key="folder.action.takeoffline.note">
          Note: only documents that are currently live will be affected. Unpublished documents are not changed.
        </wicket:message>
      </p>
    </div>
  </div>
  <div wicket:id="progressContainer">
    <div wicket:id="progressPanel"></div>
  </div>
</wicket:extend>
</html>
