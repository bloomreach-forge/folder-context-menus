<html xmlns:wicket="http://wicket.apache.org/">
<wicket:extend>
  <div wicket:id="formContainer">
    <div class="delete-folder-dialog">
      <p class="delete-warning">
        <wicket:message key="folder.action.delete.warning">
          Are you sure you want to delete this folder and all its contents? This action cannot be undone.
        </wicket:message>
      </p>
      <p class="delete-folder-name">
        <span class="field-label">
          <wicket:message key="folder.action.delete.label.folder.name">Folder:</wicket:message>
        </span>
        <strong wicket:id="folderName">Folder Name</strong>
      </p>
      <p class="delete-published-note">
        <wicket:message key="folder.action.delete.published.note">
          Note: folders containing live documents cannot be deleted. Please take all documents offline first.
        </wicket:message>
      </p>
    </div>
  </div>
  <div wicket:id="progressContainer">
    <div wicket:id="progressPanel"></div>
  </div>
</wicket:extend>
</html>
