<wicket:panel xmlns:wicket="http://wicket.apache.org">
    <div class="progress-panel">
        <div class="progress-status">
            <span wicket:id="statusLabel">Status</span>
        </div>
        <div class="progress-bar-container">
            <div wicket:id="progressBar" class="progress-bar">
                <span wicket:id="progressLabel">0%</span>
            </div>
        </div>
        <div class="progress-path">
            <span wicket:id="pathLabel">Path</span>
        </div>
        <div class="progress-actions">
            <a href="#" wicket:id="cancelButton">Cancel</a>
        </div>
    </div>
</wicket:panel>
