id: folderctxmenus
name: Bloomreach XM Extra Folder Context Menus
version: 7.2.0-SNAPSHOT
description: Bloomreach XM Extra Folder Context Menus
repository:
  url: https://github.com/bloomreach-forge/folder-context-menus
  branch: master
publisher:
  name: bloomreach-forge
  type: community
category: content-management
pluginTier: forge-addon
compatibility:
  brxm:
    min: 16.0.0
artifacts:
- type: maven-lib
  description: Repository-tier workflow extension enabling folder copy and move operations
  target: cms-dependencies
  scope: compile
  maven:
    groupId: org.onehippo.forge.folderctxmenus
    artifactId: folderctxmenus-repository
- type: maven-lib
  description: CMS plugin providing copy and move context menu actions for repository
    folders
  target: cms-dependencies
  scope: compile
  maven:
    groupId: org.onehippo.forge.folderctxmenus
    artifactId: folderctxmenus-frontend
documentation:
- type: site
  url: https://bloomreach-forge.github.io/folder-context-menus/
installation:
  target:
  - cms
  verification: Copy and Move context menu items appear in the CMS document browser
    folder context menu
